<style>

#catBtn{background:#ff4f93}

.catChain{left:0}.gatorChain{right:0}

.overlay{position:absolute;inset:0;background:#000c;z-index:9999;display:flex;align-items:center;justify-content:center;padding:18px;text-align:center;pointer-events:auto}
.panel{background:#21142f;border:3px solid #fff;border-radius:22px;padding:14px;max-width:350px;width:100%;max-height:92svh;overflow:auto;pointer-events:auto}
.panel h1{margin:0 0 8px;color:#ffd84a;text-shadow:2px 2px #000;font-size:26px}
.panel p{font-weight:800;line-height:1.35;font-size:12px}
.startBtn,.subBtn{width:100%;height:48px;background:#ff4f93;margin-top:8px;font-size:18px;pointer-events:auto}
.subBtn{background:#2ecc71}
.hidden{display:none!important}
.oldMan{font-size:54px;display:block;margin-bottom:4px}
.brainAge{font-size:30px;color:#ffd84a;text-shadow:2px 2px #000;font-weight:1000}
#bookList{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;padding-bottom:30px}
.card{background:#130b1e;border:2px solid #fff;border-radius:14px;padding:10px 6px;font-weight:900;cursor:pointer}
.card .emoji{font-size:34px;display:block}
.locked{opacity:.35;filter:grayscale(1);cursor:default}
.selectedSkin{border-color:#ffd84a;background:#3a2750;box-shadow:0 0 0 3px #ffd84a55}
.skinNote{font-size:10px;color:#ffd84a;margin-top:4px}
</style>
</head>
<body>
<audio id="bgm" src="bgm.mp3" loop preload="auto"></audio>

<div id="game">

  <div id="top">

  <div id="startScreen" class="overlay">
    <div class="panel">
      <h1>にゃんこ<br>落ち物仕分けDX</h1>
      <p>上の配送口から流れてくる落ち物を仕分けよう。</p>
      <p>魚・毛糸・猫缶・プレゼント・回復は左。<br>爆弾・石は右のワニへ。</p>
      <p>集めた猫スキンは猫図鑑から変更できます。</p>

      <button id="gameoverBookBtn" class="subBtn" type="button">猫図鑑を見る</button>

  </div>

  <div id="bookScreen" class="overlay hidden">
    <div class="panel">
      <button id="closeBookBtn" class="subBtn" type="button">ゲームに戻る</button>
      <h1>猫カード図鑑</h1>
      <p id="bookCount">0 / 7</p>
      <div id="bookList"></div>
    </div>
  </div>
</div>

<script>
var score=0,stage=1,lives=5,food=0,needFood=3,startClock=0,combo=0,maxCombo=0,fever=false,feverEnd=0,coin=0,running=false,paused=false,judging=false,current=null,x=0,y=0,v=.95,loopId=null,chains={cat:[],gator:[]},itemBag=[],aliens=[],nextAlienAt=0,chaosVX=0,chaosTick=0,giftAllowed=false,giftDropped=false,gatorHp=90,gatorMaxHp=90;
var feverFxTimer=null,bgmStarted=false;
var selectedCatName=localStorage.getItem("nyankoSelectedCat")||"ノーマル猫",collection={};
var catCards=[{emoji:"😺",name:"ノーマル猫"},{emoji:"😸",name:"ごきげん猫"},{emoji:"😼",name:"ボス猫"},{emoji:"🥷",name:"忍者猫"},{emoji:"🚀",name:"宇宙猫"},{emoji:"🦁",name:"ライオン猫"},{emoji:"👑",name:"王様猫"}];
var bosses=[["🐊","第1ワニ：ちびワニ",90,.95],["🐊","第2ワニ：ふつうワニ",130,1.1],["🐊","第3ワニ：かたいワニ",180,1.25],["🐊","第4ワニ：怒りワニ",240,1.42],["🐊","第5ワニ：鉄ワニ",320,1.6],["🦎","第6ワニ：変異ワニ",430,1.82],["🐲","第7ワニ：竜ワニ",560,2.05],["🐉","第8ワニ：火炎ワニ",720,2.3],["🦖","第9ワニ：恐竜ワニ",920,2.58],["🦕","第10ワニ：古代ワニ",1180,2.88],["👹","第11ワニ：鬼ワニ",1500,3.2],["👺","第12ワニ：天狗ワニ",1900,3.55],["💀","第13ワニ：骨ワニ",2400,3.92],["☠️","第14ワニ：呪いワニ",3050,4.32],["👾","第15ワニ：宇宙ワニ",3900,4.75],["🛸","第16ワニ：UFOワニ",5000,5.2],["🔥","第17ワニ：炎神ワニ",6500,5.7],["⚡","第18ワニ：雷神ワニ",8500,6.25],["🌋","第19ワニ：火山ワニ",11200,6.85],["🌌","第20ワニ：銀河ワニ",15000,7.5],["👑","第21ワニ：猫神を喰う神",22000,8.2]];
var items=[{e:"🐟",a:"cat",p:10},{e:"🧶",a:"cat",p:15},{e:"🥫",a:"cat",p:8,food:true},{e:"🎁",a:"cat",p:50,gift:true},{e:"❤️",a:"cat",p:5,heal:true},{e:"💣",a:"gator",p:12,damage:24},{e:"🪨",a:"gator",p:10,damage:18}];
var mergeMap={"🐟":"🐠","🐠":"🐡","🐡":"CLEAR","🧶":"🧸","🧸":"🎀","🎀":"CLEAR","🥫":"🍖","🍖":"🍗","🍗":"CLEAR","🎁":"💎","💎":"🏆","🏆":"CLEAR","❤️":"💖","💖":"💝","💝":"CLEAR","💣":"🧨","🧨":"🔥","🔥":"CLEAR","🪨":"🪙","🪙":"💰","💰":"CLEAR"};
var el={};
function $(id){return document.getElementById(id)}
function initEls(){["score","stageNum","timeTop","catLife","comboBox","feverBg","stageName","timer","board","cat","gator","gatorHpText","gatorHpBar","player","catChain","gatorChain","msg","catBtn","gatorBtn","startScreen","gameoverScreen","bookScreen","startBtn","startBookBtn","retryBtn","gameoverBookBtn","closeBookBtn","brainAge","finalScore","bookCount","bookList"].forEach(function(id){el[id]=$(id)})}
function playBgm(){var bgm=$("bgm");if(!bgm)return;bgm.volume=.35;bgm.play().then(function(){bgmStarted=true}).catch(function(){})}
function stopBgm(){var bgm=$("bgm");if(!bgm)return;bgm.pause();bgm.currentTime=0;bgmStarted=false}
function loadData(){try{collection=JSON.parse(localStorage.getItem("nyankoCollection")||"{}")}catch(e){collection={}}collection["ノーマル猫"]=true;if(!collection[selectedCatName])selectedCatName="ノーマル猫"}
function saveData(){localStorage.setItem("nyankoCollection",JSON.stringify(collection))}
function saveSkin(){localStorage.setItem("nyankoSelectedCat",selectedCatName)}
function selectedEmoji(){var c=catCards.find(function(x){return x.name===selectedCatName});return c?c.emoji:"😺"}
function renderCat(face){var badge="";if(face==="good")badge="😸";if(face==="miss")badge="🙀";if(face==="level")badge="😻";if(face==="angry")badge="😾";el.cat.innerHTML="<span>"+selectedEmoji()+"</span>"+(badge?'<span class="faceBadge">'+badge+"</span>":"");if(face){clearTimeout(window.catFaceTimer);window.catFaceTimer=setTimeout(function(){renderCat("")},520)}}
function show(t){el.msg.textContent=t;el.msg.style.opacity="1";clearTimeout(window.msgTimer);window.msgTimer=setTimeout(function(){el.msg.style.opacity="0"},650)}
function feverSweep(){el.feverBg.classList.remove("run");void el.feverBg.offsetWidth;el.feverBg.classList.add("run");clearTimeout(feverFxTimer);feverFxTimer=setTimeout(function(){el.feverBg.classList.remove("run")},1000)}
function comboHitPop(){el.comboBox.classList.remove("hit");void el.comboBox.offsetWidth;el.comboBox.classList.add("hit")}
function centerX(){return el.board.clientWidth/2-29}
function normAnswer(a){if(a==="cat"||a==="left")return"cat";if(a==="gator"||a==="trash"||a==="right")return"gator";return a}
function laneX(a){a=normAnswer(a);return a==="cat"?el.board.clientWidth*.25-29:el.board.clientWidth*.75-29}
function fallTop(){return 88}
function fallBottom(){return el.board.clientHeight-175}
function boss(){return bosses[Math.min(stage-1,20)]}
function updateBoss(){var b=boss();el.gator.textContent=b[0];el.stageName.textContent=b[1];if(stage===21){el.gator.style.fontSize="58px";el.gator.style.filter="drop-shadow(0 0 12px #ffd84a) drop-shadow(0 6px #0008)"}else{el.gator.style.fontSize="40px";el.gator.style.filter="drop-shadow(0 6px #0008)"}}
function updateHp(){gatorMaxHp=boss()[2];if(gatorHp>gatorMaxHp)gatorHp=gatorMaxHp;var pct=Math.max(0,Math.min(100,gatorHp/gatorMaxHp*100));el.gatorHpBar.style.width=pct+"%";el.gatorHpText.textContent="HP "+Math.ceil(gatorHp)+"/"+gatorMaxHp}
function getPlayTime(){return running?((Date.now()-startClock)/1000).toFixed(2):"0.00"}
function comboRate(){return fever?2:1+Math.min(combo,30)*0.03}
function updateCombo(){if(el.comboBox)el.comboBox.innerHTML="<b>HIT COMBO</b><span>"+combo+"</span><i>HIT</i><em>x"+comboRate().toFixed(1)+"</em>"}
function startFever(){fever=true;feverEnd=Date.now()+5000;feverSweep();updateCombo()}
function checkFever(){if(fever&&Date.now()>feverEnd){fever=false;updateCombo()}}
function addCombo(){combo++;if(combo>maxCombo)maxCombo=combo;if(combo>0&&combo%10===0)startFever();updateCombo();comboHitPop()}
function resetCombo(){combo=0;fever=false;updateCombo();comboHitPop()}
function update(){el.score.textContent=score;el.stageNum.textContent=stage;if(el.timeTop)el.timeTop.textContent=getPlayTime();if(el.catLife)el.catLife.textContent="❤️".repeat(Math.max(0,lives))+"🖤".repeat(Math.max(0,5-lives));updateHp();updateCombo()}
function updateTimer(){el.timer.textContent="";el.timer.style.display="none"}
function refillBag(){itemBag=[items[0],items[0],items[1],items[1],items[2],items[5],items[5],items[6],items[6]];if(score>=1200)itemBag.push(items[0],items[1],items[5],items[6]);if(score>=2500)itemBag.push(items[2],items[5],items[6]);if(score>=7000)itemBag.push(items[5],items[6]);if(score>=1200){var healRate=lives<5?.32:.10;if(Math.random()<healRate)itemBag.push(items[4])}if(giftAllowed&&!giftDropped&&score>=12000&&Math.random()<.35)itemBag.push(items[3]);if(giftAllowed&&!giftDropped&&score>=50000&&Math.random()<.35)itemBag.push(items[3]);for(var i=itemBag.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=itemBag[i];itemBag[i]=itemBag[j];itemBag[j]=tmp}}
function pickItem(){if(itemBag.length===0)refillBag();var p=itemBag.pop();if(p&&p.gift)giftDropped=true;return p}
function clearAliens(){aliens.forEach(function(a){a.el.remove()});aliens=[]}
function spawnAlienMaybe(){if(!running||paused)return;checkFever();if(Date.now()<nextAlienAt)return;if(stage<2){nextAlienAt=Date.now()+2600;return}var count=Math.min(2+Math.floor(stage/3),7),pool=["👽","🛸","☄️","🛰️","👾","🦠","⚡","💀"];for(var s=0;s<count;s++){var d=document.createElement("div");d.className="alien";d.textContent=pool[Math.floor(Math.random()*pool.length)];var size=Math.min(120,38+stage*4+Math.random()*20);d.style.fontSize=size+"px";var fromLeft=Math.random()<.5,ax=fromLeft?-120:el.board.clientWidth+120,ay=95+Math.random()*Math.max(70,el.board.clientHeight-315);aliens.push({el:d,x:ax,y:ay,dir:fromLeft?1:-1,speed:3.6+stage*.52+Math.random()*(3.2+stage*.18),hit:46+stage*3+Math.random()*18});d.style.left=ax+"px";d.style.top=ay+"px";el.board.appendChild(d)}nextAlienAt=Date.now()+Math.max(180,1600-stage*85)+Math.random()*Math.max(260,1150-stage*38)}
function moveAliens(){var px=x+36,py=y+36;aliens=aliens.filter(function(a){a.x+=a.dir*a.speed;a.y+=Math.sin(Date.now()/120+a.x*.01)*.9;a.el.style.left=a.x+"px";a.el.style.top=a.y+"px";var cx=a.x+28,cy=a.y+28;if(Math.abs(px-cx)<a.hit&&Math.abs(py-cy)<a.hit){score=Math.max(0,score-(60+stage*18));show(a.el.textContent+" じゃま！");renderCat("angry");a.el.remove();update();return false}if(a.x<-180||a.x>el.board.clientWidth+180){a.el.remove();return false}return true})}
function renderChains(){el.catChain.textContent=chains.cat.join("");el.gatorChain.textContent=chains.gator.join("")}
function addChain(a,emoji){a=normAnswer(a);if(!chains[a])chains[a]=[];chains[a].push(emoji);if(chains[a].length>8)chains[a].shift();checkChain(a);renderChains()}
function checkChain(a){var arr=chains[a],changed=true;while(changed){changed=false;var counts={};arr.forEach(function(e){counts[e]=(counts[e]||0)+1});for(var item in counts){if(counts[item]>=2){arr.splice(arr.indexOf(item),1);arr.splice(arr.indexOf(item),1);var m=mergeMap[item];if(m==="CLEAR"){score+=500*stage;show(item+"×2 消滅！+"+(500*stage))}else{arr.push(m);score+=120*stage;show(item+"×2 → "+m)}changed=true;break}}}update()}
function damageGator(dmg){dmg=Math.floor(dmg*(fever?2:1));gatorHp-=dmg;el.gator.style.transform="translateX(-50%) scale(1.18)";setTimeout(function(){el.gator.style.transform="translateX(-50%) scale(1)"},120);show("🐊に"+dmg+"ダメージ！");if(gatorHp<=0){var reward=500*stage+combo*20;coin+=stage*10;score+=reward;if(stage<21){stage++;v=boss()[3];gatorHp=boss()[2];updateBoss();updateHp()}else{gatorHp=boss()[2]}}update()}
function healLife(){if(lives<5){lives++;show("体力回復！");renderCat("level")}else{score+=80;show("体力満タン +80")}}
function gainFood(){food++;if(food>=needFood){food-=needFood;needFood+=2;show("猫が成長！");renderCat("level")}else show("猫缶 "+food+"/"+needFood)}
function openGift(){var card=catCards[Math.floor(Math.random()*catCards.length)];if(collection[card.name]){score+=50;show("重複！猫缶+1");gainFood()}else{collection[card.name]=true;selectedCatName=card.name;saveData();saveSkin();renderCat("");show(card.name+" GET!")}renderBook()}
function judge(a){a=normAnswer(a);var correct=normAnswer(current.a);if(a===correct){addCombo();var add=Math.floor(current.p*stage*comboRate());score+=add;renderCat("good");addChain(a,current.e);if(current.food)gainFood();if(current.heal)healLife();if(current.gift)openGift();if(current.damage)damageGator(current.damage+stage*6)}else{resetCombo();lives--;score=Math.max(0,score-30);show("MISS! 残り"+lives);renderCat("miss");if(lives<=0){endGame();return}}update();setTimeout(spawn,150)}
function choose(a){a=normAnswer(a);if(!running||paused||judging||!current)return;judging=true;x=laneX(a);y=fallBottom();place();setTimeout(function(){judge(a)},100)}
function place(){el.player.style.left=x+"px";el.player.style.top=y+"px"}
function spawn(){if(!running||paused)return;judging=true;current=null;el.player.textContent="？";el.player.style.opacity="0";x=(stage===21)?8+Math.random()*(el.board.clientWidth-88):centerX();y=fallTop();place();setTimeout(function(){if(!running||paused)return;current=pickItem();el.player.textContent=current.e;el.player.style.opacity="1";judging=false},stage===21?50:120)}
function loop(){if(!running)return;if(paused){if(el.timeTop)el.timeTop.textContent=getPlayTime();loopId=requestAnimationFrame(loop);return}if(stage===21){chaosTick++;if(chaosTick%10===0){v=8.5+Math.random()*5.5;chaosVX=Math.random()*4.8-2.4}x+=chaosVX;if(x<6)x=6;if(x>el.board.clientWidth-78)x=el.board.clientWidth-78}spawnAlienMaybe();moveAliens();y+=v;place();if(el.timeTop)el.timeTop.textContent=getPlayTime();if(!judging&&y>fallBottom()){judging=true;lives--;show("時間切れ！ 残り"+lives);renderCat("angry");if(lives<=0){endGame();return}update();setTimeout(spawn,230)}loopId=requestAnimationFrame(loop)}
function startGame(){playBgm();cancelAnimationFrame(loopId);clearAliens();score=0;stage=1;lives=5;food=0;needFood=3;combo=0;maxCombo=0;fever=false;coin=0;chains={cat:[],gator:[]};itemBag=[];v=boss()[3];gatorHp=boss()[2];giftAllowed=Math.random()<.5;giftDropped=false;nextAlienAt=Date.now()+2200;running=true;paused=false;judging=false;startClock=Date.now();el.startScreen.classList.add("hidden");el.gameoverScreen.classList.add("hidden");el.bookScreen.classList.add("hidden");el.feverBg.classList.remove("run");renderCat("");updateBoss();updateHp();renderChains();update();spawn();loop()}
function brainAge(){var age=80-Math.floor(score/3500)-stage;if(score<1000)age=88+Math.floor(Math.random()*8);if(age<18)age=18;if(age>99)age=99;return age}
function endGame(){running=false;paused=false;judging=true;cancelAnimationFrame(loopId);clearAliens();stopBgm();el.brainAge.textContent=brainAge()+"歳";el.finalScore.textContent="スコア："+score+" / 最大コンボ："+maxCombo+" / ワニ："+stage+" / 図鑑："+ownedCount()+"/7";el.gameoverScreen.classList.remove("hidden")}
function ownedCount(){return catCards.filter(function(c){return collection[c.name]}).length}
function renderBook(){el.bookList.innerHTML="";el.bookCount.textContent=ownedCount()+" / "+catCards.length;catCards.forEach(function(card){var owned=collection[card.name],div=document.createElement("div");div.className="card"+(owned?"":" locked")+(owned&&selectedCatName===card.name?" selectedSkin":"");div.innerHTML="<span class='emoji'>"+(owned?card.emoji:"？")+"</span><div>"+(owned?card.name:"未入手")+"</div>"+(owned&&selectedCatName===card.name?"<div class='skinNote'>使用中</div>":"");if(owned)div.onclick=function(){selectedCatName=card.name;saveSkin();renderCat("");renderBook();show("スキン変更！")};el.bookList.appendChild(div)})}
function openBook(){renderBook();if(running&&!paused)paused=true;el.bookScreen.classList.remove("hidden")}
function closeBook(){el.bookScreen.classList.add("hidden");if(running&&paused)paused=false}
function bind(id,fn){var b=$(id);if(!b)return;b.onclick=function(e){e.preventDefault();e.stopPropagation();fn()};b.ontouchstart=function(e){e.preventDefault();e.stopPropagation();fn()}}
function bootGame(){initEls();loadData();renderCat("");updateBoss();updateHp();renderBook();update();bind("startBtn",startGame);bind("retryBtn",startGame);bind("startBookBtn",openBook);bind("gameoverBookBtn",openBook);bind("closeBookBtn",closeBook);bind("catBtn",function(){choose("cat")});bind("gatorBtn",function(){choose("gator")})}
if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",bootGame)}else{bootGame()}
</script>
</body>
</html>
